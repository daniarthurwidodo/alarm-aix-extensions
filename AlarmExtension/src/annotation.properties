# Young Android Extension properties
annotation.version=1
type=extension
name=AlarmExtension
assetVersion=1
androidMinSdk=10

# Designer Component
com.google.appinventor.components.annotations.DesignerComponent.version=1
com.google.appinventor.components.annotations.DesignerComponent.description=Extension to set alarms by date and time
com.google.appinventor.components.annotations.DesignerComponent.category=EXTENSION
com.google.appinventor.components.annotations.DesignerComponent.nonVisible=true
com.google.appinventor.components.annotations.DesignerComponent.iconName=ic_alarm

# Simple Functions
SetAlarm.description=Set an alarm for a specific date and time
SetAlarm.params=year,month,day,hour,minute,message
CancelAlarm.description=Cancel all alarms

# Simple Events
AlarmSet.description=Event triggered when alarm is set successfully
AlarmSet.params=message
AlarmError.description=Event triggered when there is an error
AlarmError.params=message
AlarmCancelled.description=Event triggered when alarm is cancelled
AlarmCancelled.params=message
